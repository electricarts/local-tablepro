name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run release
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          notes_file="docs/RELEASE_NOTES_${GITHUB_REF_NAME#v}.md"
          if [[ -f "$notes_file" ]]; then
            gh release create "$GITHUB_REF_NAME" dist/*.tgz --notes-file "$notes_file" --title "Local TablePro ${GITHUB_REF_NAME#v}" --verify-tag
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tgz --generate-notes --verify-tag
          fi
